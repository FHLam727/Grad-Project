<body>

<div class="topbar">
  <div class="topbar-left">
    <div class="topbar-title">Macau Resort Analytics</div>
    <div class="topbar-sub">Archive Report</div>
  </div>
  <div class="topbar-right">
    <div id="filterSummary">Loading…</div>
    <select id="monthSelect" onchange="loadArchiveMonth(this.value)" style="
      padding:7px 12px;border-radius:8px;border:1.5px solid rgba(255,255,255,.35);
      background:#2C3E50;color:white;font-size:13px;font-weight:600;
      cursor:pointer;font-family:inherit;">
      <option value="">Select Month…</option>
    </select>
    <button class="tb-btn" onclick="goBack()">← Back</button>
    <button class="tb-btn primary" onclick="downloadPDF()">⬇ Download PDF</button>
  </div>
</div>

<div id="pdf-content"></div>

<script>
// ── Constants ─────────────────────────────────────────────────────────────────
const OP_KEYS   = ['wynn','sands','galaxy','mgm','melco','sjm','government'];
const OP_LABELS = { wynn:'Wynn', sands:'Sands', galaxy:'Galaxy', mgm:'MGM', melco:'Melco', sjm:'SJM', government:'Government' };
const OP_COLORS = { wynn:'#B45309', sands:'#1D4ED8', galaxy:'#047857', mgm:'#991B1B', melco:'#6D28D9', sjm:'#0E7490', government:'#374151' };
const CAT_ORDER = ['concert','exhibition','experience','sport','crossover','accommodation','food','shopping'];
const CAT_CONFIG = {
  concert:       { icon:'🎤', label:'Concert',     color:'#7C3AED' },
  sport:         { icon:'🏆', label:'Sport',        color:'#DC2626' },
  crossover:     { icon:'🎨', label:'Crossover',    color:'#D97706' },
  exhibition:    { icon:'🖼️',  label:'Exhibition',  color:'#0891B2' },
  experience:    { icon:'✨', label:'Experience',   color:'#059669' },
  food:          { icon:'🍴', label:'Food',         color:'#EA580C' },
  accommodation: { icon:'🏨', label:'Hotel',        color:'#2563EB' },
  shopping:      { icon:'💰', label:'Shopping',     color:'#EC4899' },
};
let currentReportData = null;

// ── Helpers ───────────────────────────────────────────────────────────────────
function isoDate(s) {
  if (!s || s === 'N/A') return '';
  if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
  const d = new Date(s.length <= 10 ? s + 'T00:00:00' : s);
  if (isNaN(d)) return s;
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function fmtDate(raw) {
  if (!raw || raw === 'N/A') return '';
  if (raw.includes('~')) {
    const [a, b] = raw.split('~').map(s => s.trim());
    const ia = isoDate(a), ib = isoDate(b);
    return ia === ib ? ia : `${ia} ~ ${ib}`;
  }
  return isoDate(raw);
}

function fmtPeriod(start, end) {
  const s = isoDate(start), e = isoDate(end);
  if (!s && !e) return 'All Dates';
  if (s && e && s !== e) return `${s} – ${e}`;
  return s || e || 'All Dates';
}

function fmtGenerated(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  if (isNaN(d)) return iso;
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

function buildReportFilename(data) {
  const start = isoDate(data?.start || data?.period?.start || '');
  const end = isoDate(data?.end || data?.period?.end || '');
  if (start && end) {
    const periodLabel = start === end ? start : `${start} to ${end}`;
    return `Macau Integrated Resorts Archive Report (${periodLabel}).pdf`;
  }
  return 'Macau Integrated Resorts Archive Report.pdf';
}

function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function hmColour(value) {
  const v = Math.max(0, Math.min(100, Number(value)||0));
  const ratio = v/100;
  const stops = [[255,245,245],[254,205,211],[251,113,133],[225,29,72],[136,19,55]];
  const pos = ratio*(stops.length-1), lo = Math.floor(pos), hi = Math.min(stops.length-1, lo+1), t = pos-lo;
  const r = Math.round(stops[lo][0]+(stops[hi][0]-stops[lo][0])*t);
  const g = Math.round(stops[lo][1]+(stops[hi][1]-stops[lo][1])*t);
  const b = Math.round(stops[lo][2]+(stops[hi][2]-stops[lo][2])*t);
  return { bg:`rgb(${r},${g},${b})`, text: ratio < 0.55 ? '#3B0A15' : '#fff' };
}

function goBack() {
  if (window.opener && !window.opener.closed) {
    window.opener.focus();
    window.close();
  } else {
    window.close();
  }
}

function resetPdfPages() {
  const root = document.getElementById('pdf-content');
  if (root) root.innerHTML = '';
}

function createPdfPage(id) {
  const root = document.getElementById('pdf-content');
  const page = document.createElement('div');
  page.className = 'pdf-page';
  if (root && root.children.length > 0) page.classList.add('break-before');
  if (id) page.id = id;
  root.appendChild(page);
  return page;
}

function chunkArray(items, size) {
  const out = [];
  for (let i = 0; i < items.length; i += size) out.push(items.slice(i, i + size));
  return out;
}

function miniHeader(data, pageLabel) {
  const period = fmtPeriod(data.start || data.period?.start, data.end || data.period?.end);
  return `<div class="page-mini-header">
    <div><div class="pmt">Macau Integrated Resorts · Archive Report</div><div class="pms">${esc(pageLabel)}</div></div>
    <div class="pms">${esc(period)}</div>
  </div>`;
}

function boldSummary(para, kpis) {
  if (!para) return '—';
  let s = esc(para).replace(/\s*Top categories:[^.]+\./i, '');
  const nums = [kpis.totalEvents, kpis.topOrganiserCount, kpis.topCategoryCount, kpis.activeOrganiserCount]
    .filter(n => n != null).map(String).sort((a,b) => b.length-a.length);
  for (const n of nums) s = s.replace(new RegExp(`\\b${n}\\b`,'g'), `<strong>${n}</strong>`);
  const names = [kpis.topOrganiser, kpis.topCategory].filter(Boolean).sort((a,b) => b.length-a.length);
  for (const name of names) {
    const safe = esc(name).replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
    s = s.replace(new RegExp(`(?<![\\w>])${safe}(?![\\w<])`,'g'), `<strong>${esc(name)}</strong>`);
  }
  return s;
}

function buildTopCategoryPills(data) {
  const categoryMix = data.chartData?.categoryMix || [];
  const topCats = categoryMix.slice(0, 3);
  if (!topCats.length) return '';
  return `<div style="display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-top:14px;">
    <span style="font-size:12px;font-weight:700;color:#777;white-space:nowrap;">Top categories:</span>
    ${topCats.map(cat => {
      const cfg = CAT_CONFIG[cat.catKey] || { icon:'📍', label:cat.label || cat.catKey || 'Category', color:'#6B7280' };
      return `<span style="padding:5px 13px;border-radius:20px;font-size:12px;font-weight:700;background:${cfg.color}14;color:${cfg.color};border:1px solid ${cfg.color}30;">${esc(cfg.icon)} ${esc(cfg.label)}</span>`;
    }).join('')}
  </div>`;
}

function renderTopbar(data) {
  const total = data.kpis?.totalEvents ?? 0;
  const ops = (data.filters?.operators || []).map(k => OP_LABELS[k]||k);
  let html = ops.map(o => `<span class="fs-pill">${esc(o)}</span>`).join('');
  html += `<span class="fs-pill">${total} event${total!==1?'s':''}</span>`;
  document.getElementById('filterSummary').innerHTML = html;
}

function buildScopeChips(data) {
  const filters = data.filters || {};
  const opKeys  = Array.isArray(filters.operators)  ? filters.operators  : [];
  const catKeys = Array.isArray(filters.categories) ? filters.categories : [];
  const opLabels  = opKeys.map(op => ({ label: OP_LABELS[String(op).toLowerCase()]||op, color: OP_COLORS[String(op).toLowerCase()]||'#2C3E50' }));
  const catLabels = catKeys.map(cat => { const k=String(cat).toLowerCase(); return { label:`${CAT_CONFIG[k]?.icon||'📍'} ${CAT_CONFIG[k]?.label||cat}`, color:CAT_CONFIG[k]?.color||'#2C3E50' }; });
  const renderChip = (item, extraClass='') => `<span class="filter-chip ${extraClass}" style="background:${item.color}14;color:${item.color};border-color:${item.color}30;">${esc(item.label)}</span>`;
  const operatorChips = opLabels.length ? opLabels.map(item => renderChip(item)).join('') : `<span class="filter-chip">All organisers</span>`;
  const categoryChips = catLabels.length ? catLabels.map(item => renderChip(item,'cat')).join('') : `<span class="filter-chip cat">All categories</span>`;
  return { operatorChips, categoryChips };
}

// ── Donut Grid ────────────────────────────────────────────────────────────────
function describeArc(cx, cy, r, sa, ea) {
  const rad = a => (a-90)*Math.PI/180;
  return `M ${cx+r*Math.cos(rad(sa))} ${cy+r*Math.sin(rad(sa))} A ${r} ${r} 0 ${(ea-sa)>180?1:0} 1 ${cx+r*Math.cos(rad(ea))} ${cy+r*Math.sin(rad(ea))}`;
}

function renderDonutGrid(rows, targetId) {
  const el = document.getElementById(targetId);
  if (!el) return;
  if (!rows.length) { el.innerHTML = '<div style="color:#999;font-size:13px;font-style:italic;">No organiser share data</div>'; return; }
  el.innerHTML = rows.map(buildOrganiserDonutCard).join('');
}

function buildOrganiserDonutCard(row) {
  const total = row.total || 0;
  const mix = (row.segments || []).filter(d => d.count > 0);
  const isWynn = row.organiserKey === 'wynn';
  const cx = 80, cy = 80, r = 54, sw = 24;
  let paths = '';
  if (total > 0) {
    if (mix.length === 1) {
      // Single segment: SVG arc cannot draw a full 360° path — use circle instead
      paths = `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${mix[0].color}" stroke-width="${sw}"/>`;
    } else {
      // Multiple segments: accumulate angles with strict clamping
      // To avoid last-segment gap: calculate each start from cumulative sum, not from previous end
      let cumulative = 0;
      const segs = mix.map(d => {
        const startAngle = cumulative;
        cumulative += (d.count / total) * 360;
        return { ...d, startAngle, endAngle: cumulative };
      });
      // Clamp last segment end to exactly 360 to close the donut
      segs[segs.length - 1].endAngle = 360;
      for (const seg of segs) {
        // Clamp sweep to max 359.99° to prevent arc collapsing on nearly-full segments
        const sa = seg.startAngle;
        const ea = Math.min(seg.endAngle, sa + 359.99);
        paths += `<path d="${describeArc(cx,cy,r,sa,ea)}" fill="none" stroke="${seg.color}" stroke-width="${sw}"/>`;
      }
    }
  }
  const legend = mix.length
    ? mix.map(d => `<div class="legend-row"><span class="legend-dot" style="background:${d.color};"></span><span style="font-size:11px;color:#475569;">${esc(d.label)}</span><span class="legend-val">${d.count}</span></div>`).join('')
    : '<div style="font-size:11px;color:#94A3B8;">No events</div>';
  return `<div class="mini-chart-card ${isWynn ? 'wynn-focus' : ''}">
    <div class="mini-card-head">
      <div>
        <div class="mini-card-title" style="${isWynn ? 'color:#B45309;' : ''}">${esc(row.label)}${isWynn ? ' ★' : ''}</div>
        <div class="mini-card-sub">Category Share</div>
      </div>
      <span class="tiny-pill ${isWynn ? 'wynn-focus' : ''}">${total} events</span>
    </div>
    <div class="mini-donut-wrap">
      <svg width="160" height="160" viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg">
        ${paths || `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#E5E7EB" stroke-width="${sw}" />`}
        <text x="${cx}" y="${cy-5}" text-anchor="middle" font-size="22" font-weight="800" fill="${isWynn ? '#B45309' : '#1E1E1E'}">${total}</text>
        <text x="${cx}" y="${cy+14}" text-anchor="middle" font-size="10" fill="#888">events</text>
      </svg>
      <div class="mini-legend">${legend}</div>
    </div>
  </div>`;
}

function renderMetricGrid(rows, mode, targetId) {
  const el = document.getElementById(targetId);
  if (!el) return;
  if (!rows.length) { el.innerHTML = '<div style="color:#999;font-size:13px;font-style:italic;">No chart data</div>'; return; }
  el.innerHTML = rows.map(row => {
    const cfg = CAT_CONFIG[row.catKey] || { icon:'📌', label:row.label||row.catKey, color:'#6B7280' };
    const items = [...(row.items || [])];
    const max = mode === 'heat' ? 100 : Math.max(1, ...items.map(item => Number(item.value)||0));
    const bars = items.map(item => {
      const val = Number(item.value) || 0;
      const width = max > 0 ? Math.max(0, Math.min(100, (val/max)*100)) : 0;
      const isWynn = item.organiserKey === 'wynn';
      return `<div class="metric-row ${isWynn ? 'wynn-focus' : ''}">
        <div class="metric-label ${isWynn ? 'wynn-focus' : ''}">${esc(item.label)}${isWynn ? ' ★' : ''}</div>
        <div class="metric-bar-track"><div class="metric-bar-fill" style="width:${width}%;background:${item.color};opacity:${val>0?0.9:0.25};"></div></div>
        <div class="metric-value ${isWynn ? 'wynn-focus' : ''}">${mode==='heat'?(val?val.toFixed(1):'0.0'):String(Math.round(val))}</div>
      </div>`;
    }).join('');
    return `<div class="mini-chart-card" style="border-top:4px solid ${cfg.color};">
      <div class="metric-card-head">
        <div class="metric-card-title"><span>${cfg.icon||'📌'}</span><span>${esc(cfg.label)}</span></div>
        <span class="tiny-pill">${mode==='heat'?'Avg heat':'Event count'}</span>
      </div>
      <div class="metric-rows">${bars}</div>
    </div>`;
  }).join('');
}

function renderTierBreakdown(data) {
  const rows = data.chartData?.heatTierByOrganiser || [];
  const el = document.getElementById('tier-inner');
  if (!el) return;
  if (!rows.length) { el.innerHTML = '<div style="color:#999;font-size:13px;font-style:italic;">No heat tier data</div>'; return; }
  const html = rows.map(row => {
    const isWynn = row.organiserKey === 'wynn';
    const total = row.total || 0;
    const highPct = total ? (row.high/total)*100 : 0;
    const midPct  = total ? (row.mid/total)*100  : 0;
    const lowPct  = total ? (row.low/total)*100  : 0;
    return `<div class="stacked-row ${isWynn ? 'wynn-focus' : ''}">
      <div class="stacked-label ${isWynn ? 'wynn-focus' : ''}">${esc(row.label)}${isWynn ? ' ★' : ''}</div>
      <div class="stacked-track">
        ${highPct > 0 ? `<div class="stacked-seg" style="width:${highPct}%;background:#1E40AF;display:flex;align-items:center;justify-content:center;">
          <span style="color:white;font-size:10px;font-weight:700;white-space:nowrap;">${Math.round(highPct)}%</span>
        </div>` : ''}
        ${midPct > 0 ? `<div class="stacked-seg" style="width:${midPct}%;background:#60A5FA;display:flex;align-items:center;justify-content:center;">
          <span style="color:white;font-size:10px;font-weight:700;white-space:nowrap;">${Math.round(midPct)}%</span>
        </div>` : ''}
        ${lowPct > 0 ? `<div class="stacked-seg" style="width:${lowPct}%;background:#CBD5E1;display:flex;align-items:center;justify-content:center;">
          <span style="color:#374151;font-size:10px;font-weight:700;white-space:nowrap;">${Math.round(lowPct)}%</span>
        </div>` : ''}
      </div>
      <div class="stacked-total ${isWynn ? 'wynn-focus' : ''}">${total} events</div>
    </div>`;
  }).join('');
  el.innerHTML = `<div class="stacked-wrap">${html}</div>
    <div class="stacked-legend">
      <span><i class="legend-swatch" style="background:#1E40AF;"></i>High (≥ 60)</span>
      <span><i class="legend-swatch" style="background:#60A5FA;"></i>Mid (30–59)</span>
      <span><i class="legend-swatch" style="background:#CBD5E1;"></i>Low (&lt; 30)</span>
    </div>`;
}

function renderHeatmap(data) {
  const hm = data.heatmapData||{};
  const filters = data.filters || {};
  const filterOps  = Array.isArray(filters.operators)  && filters.operators.length  ? filters.operators  : OP_KEYS;
  const activeCats = CAT_ORDER.filter(c => hm[c]);
  const activeOps  = filterOps.filter(opKey => OP_KEYS.includes(opKey));
  if (!activeCats.length || !activeOps.length) { document.getElementById('hm-inner').innerHTML='<div style="color:#999;font-size:13px;font-style:italic;">No heatmap data</div>'; return; }
  let t=`<table style="border-collapse:collapse;width:100%;font-size:11px;font-family:ui-sans-serif,sans-serif;">`;
  t+=`<tr><th style="padding:5px 8px;text-align:left;font-size:10px;color:#555;font-weight:700;"></th>`;
  for (const c of activeCats) { const cfg=CAT_CONFIG[c]||{icon:'',label:c}; t+=`<th style="padding:5px 6px;text-align:center;font-size:10px;color:#555;font-weight:700;">${cfg.icon} ${esc(cfg.label)}</th>`; }
  t+=`</tr>`;
  for (const opKey of activeOps) {
    const isWynn = opKey === 'wynn';
    t+=`<tr><td style="padding:6px 8px;text-align:left;font-size:11px;font-weight:700;color:${isWynn?'#B45309':'#374151'};white-space:nowrap;background:${isWynn?'rgba(180,83,9,0.08)':'transparent'};">${esc(OP_LABELS[opKey])}${isWynn?' ★':''}</td>`;
    for (const cat of activeCats) {
      const cell=hm[cat]?.[opKey];
      if (!cell||cell.n===0) { t+=`<td style="padding:7px 8px;text-align:center;font-size:10.5px;font-weight:600;border:1px solid rgba(0,0,0,.06);background-color:#F3F4F6;color:#9CA3AF;">0</td>`; }
      else { const col=hmColour(cell.h||0); t+=`<td style="padding:7px 8px;text-align:center;font-size:10.5px;font-weight:600;border:1px solid rgba(0,0,0,.06);background-color:${col.bg};color:${col.text};">${cell.n}<br><span style="font-size:9px;opacity:.85;">🔥${cell.h!=null?cell.h.toFixed(0):'—'}</span></td>`; }
    }
    t+=`</tr>`;
  }
  t+=`</table>`;
  document.getElementById('hm-inner').innerHTML=`<div style="overflow-x:auto;">${t}</div>`;
}

function renderLeaderboard(data) {
  const lb=data.leaderboard||[];
  if (!lb.length) { document.getElementById('lb-inner').innerHTML=`<div style="color:#999;font-size:13px;font-style:italic;">Leaderboard data unavailable. Ensure bridge.py is running.</div>`; return; }

    return `<div class="lb-item">
      <div class="lb-rank" style="background:${bg};">${e.rank}</div>
      <div class="lb-body">
        <div class="lb-name">${esc(e.name)}</div>

function renderStrategy(data) {
  const ai = data.aiStrategy || {};
  const recItems = ai.recommendationItems || [];
  const comps = ai.comparisons || [];
  const TYPE_CONFIG = {
    keep_up: { icon:'🚀', label:'Keep it Up',   color:'#15803D', bg:'rgba(22,163,74,0.08)',  border:'rgba(22,163,74,0.22)' },
    improve: { icon:'⚡', label:'Improve',       color:'#B45309', bg:'rgba(245,158,11,0.08)', border:'rgba(245,158,11,0.22)' },
    avoid:   { icon:'🚫', label:'Avoid for Now', color:'#B91C1C', bg:'rgba(220,38,38,0.06)',  border:'rgba(220,38,38,0.18)' }
  };

  // Strategy page first
  if (!recItems.length) {
    const page = createPdfPage('page-strategy-empty');
    page.innerHTML = miniHeader(data,'3. Strategic Recommendations for Wynn') +
      `<div class="strategy-shell"><div class="strategy-head">
        <div><div class="strategy-title">Strategic Recommendations for Wynn</div>
        <div class="strategy-sub">Focused strategic recommendations grounded in Wynn's real brand strengths and live market heat data.</div></div>
        <div class="strategy-ai-pill">✦ AI-GENERATED</div>
      </div>
      <div style="font-size:13px;color:#999;font-style:italic;">AI recommendations not available for this archive period.</div></div>`;
  } else {
    let html = miniHeader(data,'3. Strategic Recommendations for Wynn');
    html += `<div class="strategy-shell compact"><div class="strategy-head">
      <div><div class="strategy-title">Strategic Recommendations for Wynn</div>
      <div class="strategy-sub">Focused strategic recommendations grounded in Wynn's real brand strengths and live market heat data.</div></div>
      <div class="strategy-ai-pill">✦ AI-GENERATED</div>
    </div><div class="strategy-list">`;
    html += recItems.map(rec => {
      const catKey = String(rec.catKey||'').toLowerCase();
      // If Wynn has 0 events in this category, cannot be "keep_up" — force to "improve"
      const comp4type = comps.find(item => item.catKey === catKey);
      const wynnHasEvents = (comp4type?.wynn?.count || 0) > 0;
      const type   = (!wynnHasEvents && String(rec.type||'').toLowerCase() === 'keep_up') ? 'improve' : String(rec.type||'improve').toLowerCase();
      const cfg    = TYPE_CONFIG[type] || TYPE_CONFIG.improve;
      const catCfg = CAT_CONFIG[catKey] || { icon:'📌', label:catKey, color:'#6B7280' };
      const comp   = comps.find(item => item.catKey === catKey);
      return `<div class="strategy-card ${type}" style="background:${cfg.bg};border-color:${cfg.border};">
        <div class="strategy-card-head">
          <div class="strategy-icon" style="background:${cfg.color}18;border-color:${cfg.color}30;">${cfg.icon}</div>
          <div class="strategy-body">
            <div class="strategy-badges">
              <span class="strategy-type" style="color:${cfg.color};background:${cfg.color}14;border-color:${cfg.color}28;">${cfg.icon} ${cfg.label}</span>
              <span class="strategy-cat">${catCfg.icon||'📌'} ${esc(catCfg.label||catKey)}</span>
            </div>
            <div class="strategy-text">${esc(rec.text||'')}</div>
            ${buildStrategyRankingHtml(comp)}
          </div>
        </div>
      </div>`;
    }).join('');
    html += `</div></div>`;
    const page = createPdfPage('page-strategy');
    page.innerHTML = html;
  }

  // Leaderboard page after strategy
  const lbPage = createPdfPage('page-leaderboard');
  lbPage.innerHTML = miniHeader(data,'4. Heat Leaderboard') + `
    <div class="chart-block page-section">
      <div class="chart-title">Heat Leaderboard — Top 10</div>
      <div class="chart-sub">Top 10 activities across all organisers and categories</div>
      <div id="lb-inner"></div>
    </div>`;
  renderLeaderboard(data);
}

function buildStrategyRankingHtml(comp) {
  if (!comp) return '';
  // Always include Wynn even when count=0 — show Wynn's position (or absence) in ranking
  const wynnRow = { opTitle:'Wynn', count:comp.wynn?.count||0, avg:comp.wynn?.avgHeat||0 };
  const opponents = [
    ...(comp.topOpponent ? [{ opTitle:comp.topOpponent.organiser, count:comp.topOpponent.count||0, avg:comp.topOpponent.avgHeat||0 }] : []),
    ...(Array.isArray(comp.opponents) ? comp.opponents.map(opp => ({ opTitle:opp.organiser, count:opp.count||0, avg:opp.avgHeat||opp.avg||0 })) : [])
  ].filter(row => row.count > 0); // competitors still filtered — only Wynn always shown
  const rows = [wynnRow, ...opponents.filter(row => row.opTitle !== 'Wynn')];
  // Deduplicate
  const seen = new Set();
  const uniqueRows = rows.filter(row => { if (seen.has(row.opTitle)) return false; seen.add(row.opTitle); return true; });
  uniqueRows.sort((a,b) => (b.avg||0)-(a.avg||0));
  const html = uniqueRows.map((row, i) => {
    const isWynn = row.opTitle === 'Wynn';
    const color = { Wynn:'#B45309', Sands:'#1D4ED8', Galaxy:'#047857', MGM:'#991B1B', Melco:'#6D28D9', SJM:'#0E7490', Government:'#374151' }[row.opTitle]||'#6B7280';
    const heatLabel = row.count === 0 ? '<span style="color:#9CA3AF;font-style:italic;">no events</span>' : `🔥 avg ${Number(row.avg||0).toFixed(1)}`;
    return `<div class="strategy-rank-row ${isWynn?'wynn-focus':''}">
      <span class="strategy-rank-badge">${i+1}</span>
      <span class="strategy-rank-name" style="color:${color};">${esc(row.opTitle)}</span>
      <span class="strategy-rank-count">: ${row.count}</span>
      <span class="strategy-rank-heat">${heatLabel}</span>
    </div>`;
  }).join('');
  const label = CAT_CONFIG[comp.catKey]?.label || comp.label || comp.catKey || '';
  return `<div class="strategy-rank-wrap">
    <div class="strategy-rank-title">Heat Ranking · ${esc(String(label).toUpperCase())}</div>
    <div class="strategy-rank-list">${html}</div>
  </div>`;
}

// ── Download PDF ──────────────────────────────────────────────────────────────
async function downloadPDF() {
  const element = document.getElementById('pdf-content');
  const pages = Array.from(element.querySelectorAll('.pdf-page'));
  const filename = buildReportFilename(currentReportData);
  if (!pages.length) return;
  document.body.classList.add('pdf-exporting');
  try {
    const pdf = new window.jspdf.jsPDF({ unit:'mm', format:'a4', orientation:'portrait' });
    const pageWidth = 210, pageHeight = 297, margin = 8;
    const contentWidth = pageWidth - (margin * 2);
    const contentHeight = pageHeight - (margin * 2);
    for (let i = 0; i < pages.length; i++) {
      const canvas = await window.html2canvas(pages[i], {
        scale: 2, useCORS: true, logging: false,
        backgroundColor: '#ffffff', scrollX: 0, scrollY: 0
      });
      const imgData = canvas.toDataURL('image/jpeg', 0.98);
      let imgWidth = contentWidth;
      let imgHeight = (canvas.height * imgWidth) / canvas.width;
      if (imgHeight > contentHeight) {
        imgHeight = contentHeight;
        imgWidth = (canvas.width * imgHeight) / canvas.height;
      }
      const x = margin + ((contentWidth - imgWidth) / 2);
      if (i > 0) pdf.addPage();
      pdf.addImage(imgData, 'JPEG', x, margin, imgWidth, imgHeight);
    }
    pdf.save(filename);
  } finally {
    document.body.classList.remove('pdf-exporting');
  }
}

function buildQuarterOptions(months) {
  const quarters = {};
  months.forEach(m => {
    const [y, mo] = m.split('-').map(Number);
    const q = Math.ceil(mo / 3);
    const key = `${y}-Q${q}`;
    if (!quarters[key]) quarters[key] = { year: y, q, months: [] };
    quarters[key].months.push(m);
  });
  return Object.entries(quarters)
    .filter(([, v]) => v.months.length === 3)
    .map(([key, v]) => `<option value="${key}">${v.year} Q${v.q}</option>`)
    .join('');
}

async function loadArchiveMonth(month) {
  if (!month) return;
  let from_str, to_str, apiParam;
  if (month && month.includes('-Q')) {
    const [y, q] = month.split('-Q');
    const quarterMap = {
      '1': [`${y}-01-01`, `${y}-03-31`],
      '2': [`${y}-04-01`, `${y}-06-30`],
      '3': [`${y}-07-01`, `${y}-09-30`],
      '4': [`${y}-10-01`, `${y}-12-31`]
    };
    [from_str, to_str] = quarterMap[q];
    apiParam = `from_date=${from_str}&to_date=${to_str}`;
  } else {
    const [y, mo] = month.split('-');
    const lastDay = new Date(parseInt(y), parseInt(mo), 0).getDate();
    from_str = `${y}-${mo}-01`;
    to_str   = `${y}-${mo}-${String(lastDay).padStart(2,'0')}`;
    apiParam = `month=${month}`;
  }
  resetPdfPages();
  const loading = document.createElement('div');
  loading.style.cssText = 'padding:60px;text-align:center;color:#999;font-size:14px;';
  loading.textContent = 'Loading…';
  document.getElementById('pdf-content').appendChild(loading);
  document.getElementById('filterSummary').innerHTML = 'Loading…';

  try {
    const res = await fetch(`${BRIDGE}/api/archive/report?${apiParam}`);
    const result = await res.json();
    console.log('[Archive] period:', result.period);

    if (result.status === 'error') {
      document.getElementById('pdf-content').innerHTML = `<div style="padding:40px;text-align:center;color:#B91C1C;">${result.message}</div>`;
      return;
    }

    // 讀 report_insights（hotThemes + recommendations + comparisons）
    let insights = null;
    try {
      const ir = await fetch(`${BRIDGE}/api/report-insights?from_date=${from_str}&to_date=${to_str}`);
      const insightsRes = await ir.json();
      if (insightsRes.status === 'success') insights = insightsRes;
      console.log('[Archive] insights loaded:', insights?.hotThemes?.length, 'themes,', insights?.aiRecommendations?.length, 'recs');
    } catch(e) {
      console.warn('report-insights fetch failed:', e);
    }

    // 讀 period_cache leaderboard（儲存喺 operation panel generate 時）
    let cachedLeaderboard = [];
    try {
      const pc = await fetch(`${BRIDGE}/api/period-cache/get?from_date=${from_str}&to_date=${to_str}`);
      const pcData = await pc.json();
      // bridge returns {success, hot_themes, recommendations, leaderboard}
      const lbArr = pcData.leaderboard || pcData.leaderboard_data || [];
      if ((pcData.success === true || pcData.status === 'success') && Array.isArray(lbArr) && lbArr.length) {
        cachedLeaderboard = lbArr;
        console.log('[Archive] period_cache leaderboard loaded:', cachedLeaderboard.length, 'items');
      }
    } catch(e) {
      console.warn('period-cache leaderboard fetch failed:', e);
    }

    // Fallback: 若 period_cache 冇 leaderboard，嘗試 leaderboard-ai API
    if (!cachedLeaderboard.length) {
      try {
        const lb = await fetch(`${BRIDGE}/api/heat/leaderboard-ai?top=10`);
        const lbData = await lb.json();
        if (lbData.top_overall && Array.isArray(lbData.top_overall)) {
          cachedLeaderboard = lbData.top_overall.map((e, i) => ({
            rank: i + 1,
            name: e.name || e.ai_name || '',
            organiserKey: (e.operator || '').toLowerCase(),
            organiser: OP_LABELS[(e.operator || '').toLowerCase()] || e.operator || '',
            category: (e.category || '').toLowerCase(),
            heat_score: e.heat_score != null ? Number(e.heat_score) : null,
            newest_post: e.newest_post || '',
            source_count: e.source_count || 0,
          }));
          console.log('[Archive] leaderboard-ai fallback loaded:', cachedLeaderboard.length, 'items');
        }
      } catch(e) {
        console.warn('leaderboard-ai fallback failed:', e);
      }
    }
    result.start = from_str;
    result.end = to_str;

    const data = buildReportData(result.data, month, insights, cachedLeaderboard, result.heatmap || {}, from_str, to_str);
    currentReportData = data;
    if (result.status === 'incomplete') {
      console.warn('[Archive] Incomplete archive:', result.message);
    }

    resetPdfPages();
    renderTopbar(data);
    renderCover(data);
    renderAnalytics(data);
    renderStrategy(data);
    renderEvents(data);
  } catch(e) {
    document.getElementById('pdf-content').innerHTML = `<div style="padding:40px;text-align:center;color:#B91C1C;">Error: ${e.message}</div>`;
  }
}



function buildReportData(archiveData, month, insights, cachedLeaderboard, archiveHeatmap, from_str, to_str) {
  // archiveData = { wynn: [...], sands: [...], ... }
  // 轉成同 macauReportData 完全一樣嘅結構
  const isQuarterly = month.includes('-Q');
  const from_date = isQuarterly ? from_str : `${month}-01`;
  const to_date = isQuarterly ? to_str : (() => {
    const [y, mo] = month.split('-');
    const lastDay = new Date(parseInt(y), parseInt(mo), 0).getDate();
    return `${y}-${mo}-${String(lastDay).padStart(2,'0')}`;
  })();

  const OP_KEYS_ALL   = ['wynn','sands','galaxy','mgm','melco','sjm','government'];
  const CAT_KEYS_ALL  = ['concert','exhibition','experience','sport','crossover','accommodation','food','shopping'];
  const _OP_L  = { wynn:'Wynn', sands:'Sands', galaxy:'Galaxy', mgm:'MGM', melco:'Melco', sjm:'SJM', government:'Government' };
  const _OP_C  = { wynn:'#B45309', sands:'#1D4ED8', galaxy:'#047857', mgm:'#991B1B', melco:'#6D28D9', sjm:'#0E7490', government:'#374151' };
  const _CAT_L = { concert:'Concert', sport:'Sport', crossover:'Crossover', exhibition:'Exhibition', experience:'Experience', food:'Food', accommodation:'Hotel', shopping:'Shopping' };
  const _CAT_C = { concert:'#7C3AED', sport:'#DC2626', crossover:'#D97706', exhibition:'#0891B2', experience:'#059669', food:'#EA580C', accommodation:'#2563EB', shopping:'#EC4899' };

  // Flatten all activities, attach operator key
  const allActivities = [];
  for (const [opKey, acts] of Object.entries(archiveData)) {
    for (const act of (acts || [])) {
      allActivities.push({ ...act, operator: opKey });
    }
  }

  // KPIs
  const opCounts = {}, catCounts = {};
  for (const act of allActivities) {
    const op  = act.operator || 'unknown';
    const cat = act.category || 'experience';
    opCounts[op]   = (opCounts[op]  || 0) + 1;
    catCounts[cat] = (catCounts[cat] || 0) + 1;
  }
  const sortedOps  = Object.entries(opCounts).sort((a,b) => b[1]-a[1]);
  const sortedCats = Object.entries(catCounts).filter(([,n]) => n > 0).sort((a,b) => b[1]-a[1]);
  const topOp  = sortedOps[0]?.[0]  ?? null;
  const topCat = sortedCats[0]?.[0] ?? null;

  // Events by category
  const events = {};
  for (const act of allActivities) {
    const cat   = act.category || 'experience';
    const opKey = act.operator || '';
    if (!events[cat]) events[cat] = [];
    events[cat].push({
      name:           act.name        || '',
      description:    act.description || '',
      organiser:      _OP_L[opKey]    || opKey,
      organiserKey:   opKey,
      organiserColor: _OP_C[opKey]    || '#6B7280',
      heat_score:     act.heat_score  ?? null,
      date:           act.date        || '',
      location:       act.location    || '',
    });
  }

  // heatmap
  const heatmapData = {};
  // Step 1: event counts from activities
  for (const [opKey, acts] of Object.entries(archiveData)) {
    for (const act of (acts || [])) {
      const cat = (act.category === 'entertainment'
        ? (act.sub_type || 'concert')
        : act.category) || 'experience';
      if (!heatmapData[cat]) heatmapData[cat] = {};
      if (!heatmapData[cat][opKey]) heatmapData[cat][opKey] = { n:0, h:0 };
      heatmapData[cat][opKey].n++;
    }
  }
  // Step 2: heat scores — prefer archiveHeatmap (direct from events_deduped)
  if (archiveHeatmap && Object.keys(archiveHeatmap).length) {
    for (const [catKey, ops] of Object.entries(archiveHeatmap)) {
      if (!heatmapData[catKey]) heatmapData[catKey] = {};
      for (const [opKey, cell] of Object.entries(ops)) {
        if (!heatmapData[catKey][opKey]) heatmapData[catKey][opKey] = { n: cell.n, h: cell.h };
        else heatmapData[catKey][opKey].h = cell.h;
      }
    }
  } else if (insights?.comparisons?.length) {
    // fallback: comparisons
    for (const comp of insights.comparisons) {
      const catKey = (comp.catKey || '').toLowerCase();
      if (!heatmapData[catKey]) continue;
      if (comp.wynn?.avgHeat && heatmapData[catKey]['wynn']) {
        heatmapData[catKey]['wynn'].h = comp.wynn.avgHeat;
      }
      for (const opp of (comp.opponents || [])) {
        const opKey = Object.keys(_OP_L).find(k =>
          _OP_L[k].toLowerCase() === (opp.organiser||'').toLowerCase()
        );
        if (opKey && heatmapData[catKey][opKey]) {
          heatmapData[catKey][opKey].h = opp.avgHeat || opp.avg || 0;
        }
      }
    }
  }

  // Chart data — same structure as collectReportData()
  const allActs = allActivities.map(act => ({
    ...act,
    _catKey: (act.category === 'entertainment' ? (act.sub_type || 'concert') : act.category) || 'experience'
  }));

  const categoryMix = sortedCats.filter(([,n]) => n > 0)
    .map(([k, count]) => ({ catKey: k, label: _CAT_L[k]||k, color: _CAT_C[k]||'#6B7280', count }));

  const heatByOrganiser = sortedOps.map(([opKey]) => {
    const acts  = allActs.filter(a => a.operator === opKey);
    const heats = acts.map(a => parseFloat(a.heat_score)).filter(v => isFinite(v));
    return { organiserKey: opKey, label: _OP_L[opKey]||opKey, color: _OP_C[opKey]||'#6B7280',
      avgHeat: heats.length ? heats.reduce((s,v)=>s+v,0)/heats.length : 0 };
  }).filter(o => o.avgHeat > 0);

  const activeOpKeys  = Object.keys(archiveData);
  const activeCatKeys = CAT_KEYS_ALL;

  const categoryShareByOrganiser = activeOpKeys.map(opKey => {
    const organiserActs = allActs.filter(a => a.operator === opKey);
    const counts = activeCatKeys.map(catKey => {
      const count = organiserActs.filter(a => a._catKey === catKey).length;
      return { catKey, label: _CAT_L[catKey]||catKey, color: _CAT_C[catKey]||'#6B7280', count };
    }).filter(item => item.count > 0);
    return { organiserKey: opKey, label: _OP_L[opKey]||opKey, color: _OP_C[opKey]||'#6B7280',
      total: organiserActs.length, segments: counts };
  });

  const eventDistributionByCategory = activeCatKeys.map(catKey => ({
    catKey, label: _CAT_L[catKey]||catKey, color: _CAT_C[catKey]||'#6B7280',
    items: activeOpKeys.map(opKey => ({
      organiserKey: opKey, label: _OP_L[opKey]||opKey, color: _OP_C[opKey]||'#6B7280',
      value: allActs.filter(a => a.operator === opKey && a._catKey === catKey).length
    }))
  })).filter(row => row.items.some(item => item.value > 0));

  const avgHeatByCategory = activeCatKeys.map(catKey => ({
    catKey, label: _CAT_L[catKey]||catKey, color: _CAT_C[catKey]||'#6B7280',
    items: activeOpKeys.map(opKey => {
      // Archive activities have no heat_score stored — derive from leaderboard entries
      // or insights comparisons if available
      let value = 0;

      // 1) Try insights.comparisons (has avgHeat per catKey per organiser)
      if (insights?.comparisons?.length) {
        const comp = insights.comparisons.find(c => (c.catKey||'').toLowerCase() === catKey);
        if (comp) {
          const opLabel = _OP_L[opKey] || opKey;
          if (opKey === 'wynn' && comp.wynn?.avgHeat) {
            value = comp.wynn.avgHeat;
          } else {
            const opp = (comp.opponents || []).find(o => (o.organiser||'').toLowerCase() === opLabel.toLowerCase());
            if (opp) value = opp.avgHeat || opp.avg || 0;
          }
        }
      }

      // 2) Fallback: derive from cachedLeaderboard entries matching catKey + organiser
      if (!value && Array.isArray(cachedLeaderboard) && cachedLeaderboard.length) {
        const matching = cachedLeaderboard.filter(e =>
          (e.category||'').toLowerCase() === catKey &&
          (e.organiserKey||e.operator||'').toLowerCase() === opKey &&
          e.heat_score != null
        );
        if (matching.length) {
          value = matching.reduce((s, e) => s + Number(e.heat_score), 0) / matching.length;
        }
      }

      return { organiserKey: opKey, label: _OP_L[opKey]||opKey, color: _OP_C[opKey]||'#6B7280', value };
    })
  })).filter(row => row.items.some(item => item.value > 0));

  const heatTierByOrganiser = activeOpKeys.map(opKey => {
    const acts = allActs.filter(a => a.operator === opKey);
    const opLabel = _OP_L[opKey] || opKey;

    // Build a synthetic heat array from insights.comparisons
    // Each comparison entry has count + avgHeat per organiser per catKey
    const heats = [];
    if (insights?.comparisons?.length) {
      for (const comp of insights.comparisons) {
        let avg = 0, count = 0;
        if (opKey === 'wynn') {
          avg   = comp.wynn?.avgHeat || 0;
          count = comp.wynn?.count   || 0;
        } else {
          const opp = (comp.opponents || []).find(o =>
            (o.organiser||'').toLowerCase() === opLabel.toLowerCase()
          );
          if (opp) { avg = opp.avgHeat || opp.avg || 0; count = opp.count || 0; }
        }
        for (let i = 0; i < count; i++) heats.push(avg);
      }
    }

    // Fallback: leaderboard entries for this organiser
    if (!heats.length && Array.isArray(cachedLeaderboard)) {
      cachedLeaderboard
        .filter(e => (e.organiserKey||e.operator||'').toLowerCase() === opKey && e.heat_score != null)
        .forEach(e => heats.push(Number(e.heat_score)));
    }

    // Last fallback: use total event count with 0 heat (shows grey Low bar at least)
    const total = acts.length;
    const high  = heats.filter(v => v >= 60).length;
    const mid   = heats.filter(v => v >= 30 && v < 60).length;
    const low   = heats.filter(v => v < 30).length;
    // If we have comparisons data but count < total, fill remainder as low
    const remainder = total - high - mid - low;

    return {
      organiserKey: opKey, label: _OP_L[opKey]||opKey, color: _OP_C[opKey]||'#6B7280',
      total,
      high,
      mid,
      low: low + Math.max(0, remainder)
    };
  });

  // Leaderboard — always use allActivities (report period data only)
  let leaderboard = [...allActivities]
    .filter(a => a.heat_score != null)
    .sort((a,b) => (b.heat_score||0) - (a.heat_score||0))
    .slice(0, 10)
    .map((act, i) => ({
      rank: i+1, name: act.name||'', description: act.description||'',
      organiserKey: act.operator||'', organiser: _OP_L[act.operator||'']||act.operator||'',
      category: act.category||'', heat_score: act.heat_score??0,
      decay_factor: act.decay_factor??1, newest_post: act.newest_post||'',
      platforms: act.platforms||[], source_count: act.source_count||0
    }));

  // AI Strategy from insights
  const cachedAiRecs = insights?.aiRecommendations || [];
  const recommendations = cachedAiRecs.length
    ? cachedAiRecs.map(rec => {
        const typeLabel = rec.type === 'keep_up' ? '✅ Keep it Up' : rec.type === 'avoid' ? '🚫 Avoid for Now' : '⚡ Improve';
        return `[${typeLabel}] ${rec.catKey}: ${rec.text || ''}`;
      }).join('\n\n')
    : 'Archive report — AI strategy analysis not available for this period.';

  return {
    generatedAt: new Date().toISOString(),
    reportScope: 'archive',
    period: { start: from_str, end: to_str },
    filters: { operators: activeOpKeys, categories: activeCatKeys },
    kpis: {
      totalEvents:          allActivities.length,
      topOrganiserKey:      topOp,
      topOrganiser:         _OP_L[topOp]||topOp||'—',
      topOrganiserCount:    sortedOps[0]?.[1] ?? 0,
      topCategoryKey:       topCat,
      topCategory:          _CAT_L[topCat]||topCat||'—',
      topCategoryCount:     sortedCats[0]?.[1] ?? 0,
      activeOrganiserCount: sortedOps.length,
    },
    summary: { paragraph: `Archive report for ${from_str.slice(0,7)}. Total ${allActivities.length} events across ${sortedOps.length} organisers.` },
    events,
    heatmapData,
    chartData: { categoryMix, heatByOrganiser, categoryShareByOrganiser, eventDistributionByCategory, avgHeatByCategory, heatTierByOrganiser },
    leaderboard,
    hotThemes: insights?.hotThemes || [],
    keywords:  [],
    aiStrategy: {
      comparisons:        insights?.comparisons       || [],
      recommendations,
      recommendationItems: insights?.aiRecommendations || [],
    },
  };
}

window.onload = loadMonthList;

</script>
