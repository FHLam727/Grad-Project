<body>

<div class="topbar">
  <div class="topbar-left">
    <div class="topbar-title">Macau Resort Analytics</div>
    <div class="topbar-sub">Market Report</div>
  </div>
  <div class="topbar-right">
    <div id="filterSummary">Loading…</div>
    <button class="tb-btn" onclick="goBack()">← Back</button>
    <button class="tb-btn primary" onclick="downloadPDF()">⬇ Download PDF</button>
  </div>
</div>

<div id="pdf-content"></div>

<script>
// ── Constants ─────────────────────────────────────────────────────────────────
const OP_KEYS   = ['wynn','sands','galaxy','mgm','melco','sjm','government'];
const OP_LABELS = { wynn:'Wynn', sands:'Sands', galaxy:'Galaxy', mgm:'MGM', melco:'Melco', sjm:'SJM', government:'Government' };
const OP_COLORS = { wynn:'#B45309', sands:'#1D4ED8', galaxy:'#047857', mgm:'#991B1B', melco:'#6D28D9', sjm:'#0E7490', government:'#374151' };
const CAT_ORDER = ['concert','exhibition','experience','sport','crossover','accommodation','food','shopping','gaming'];
const CAT_CONFIG = {
  concert:       { icon:'🎤', label:'Concert',     color:'#7C3AED' },
  sport:         { icon:'🏆', label:'Sport',        color:'#DC2626' },
  crossover:     { icon:'🎨', label:'Crossover',    color:'#D97706' },
  exhibition:    { icon:'🖼️',  label:'Exhibition',  color:'#0891B2' },
  experience:    { icon:'✨', label:'Experience',   color:'#059669' },
  food:          { icon:'🍴', label:'Food',         color:'#EA580C' },
  accommodation: { icon:'🏨', label:'Hotel',        color:'#2563EB' },
  shopping:      { icon:'💰', label:'Shopping',     color:'#EC4899' },
  gaming:        { icon:'🎰', label:'Gaming',       color:'#BE185D' },
};

// ── Helpers ───────────────────────────────────────────────────────────────────
function isoDate(s) {
  if (!s || s === 'N/A') return '';
  if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
  const d = new Date(s.length <= 10 ? s + 'T00:00:00' : s);
  if (isNaN(d)) return s;
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

// Preserve full date range "2026-03-12~2026-03-22" → "2026-03-12 ~ 2026-03-22"
function fmtDate(raw) {
  if (!raw || raw === 'N/A') return '';
  if (raw.includes('~')) {
    const [a, b] = raw.split('~').map(s => s.trim());
    const ia = isoDate(a), ib = isoDate(b);
    return ia === ib ? ia : `${ia} ~ ${ib}`;
  }
  return isoDate(raw);
}

function fmtPeriod(start, end) {
  const s = isoDate(start), e = isoDate(end);
  if (!s && !e) return 'All Dates';
  if (s && e && s !== e) return `${s} – ${e}`;
  return s || e || 'All Dates';
}

function fmtGenerated(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  if (isNaN(d)) return iso;
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

function buildReportFilename(data) {
  const start = isoDate(data?.period?.start || '');
  const end = isoDate(data?.period?.end || '');
  if (start && end) {
    const periodLabel = start === end ? start : `${start} to ${end}`;
    return `Macau Integrated Resorts Market Report (${periodLabel}).pdf`;
  }
  return 'Macau Integrated Resorts Market Report.pdf';
}

function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function hmColour(value) {
  const v = Math.max(0, Math.min(100, Number(value)||0));
  const ratio = v/100;
  const stops = [[255,245,245],[254,205,211],[251,113,133],[225,29,72],[136,19,55]];
  const pos = ratio*(stops.length-1), lo = Math.floor(pos), hi = Math.min(stops.length-1, lo+1), t = pos-lo;
  const r = Math.round(stops[lo][0]+(stops[hi][0]-stops[lo][0])*t);
  const g = Math.round(stops[lo][1]+(stops[hi][1]-stops[lo][1])*t);
  const b = Math.round(stops[lo][2]+(stops[hi][2]-stops[lo][2])*t);
  return { bg:`rgb(${r},${g},${b})`, text: ratio < 0.55 ? '#3B0A15' : '#fff' };
}

function goBack() {
  if (window.opener && !window.opener.closed) { window.opener.focus(); window.close(); }
  else window.close();
}

function resetPdfPages() {
  const root = document.getElementById('pdf-content');
  if (root) root.innerHTML = '';
}

function createPdfPage(id) {
  const root = document.getElementById('pdf-content');
  const page = document.createElement('div');
  page.className = 'pdf-page';
  if (root && root.children.length > 0) page.classList.add('break-before');
  if (id) page.id = id;
  root.appendChild(page);
  return page;
}

function chunkArray(items, size) {
  const out = [];
  for (let i = 0; i < items.length; i += size) out.push(items.slice(i, i + size));
  return out;
}

// ── Mini-header: repeats on pages 2-4 ────────────────────────────────────────
function miniHeader(data, pageLabel) {

// ── Bold key numbers & names in summary ──────────────────────────────────────
function boldSummary(para, kpis) {
  if (!para) return '—';
  let s = esc(para).replace(/\s*Top categories:[^.]+\./i, '');

  // Bold numbers (longest first to avoid nested partial replacement)
  const nums = [kpis.totalEvents, kpis.topOrganiserCount, kpis.topCategoryCount, kpis.activeOrganiserCount]
    .filter(n => n != null).map(String).sort((a,b) => b.length-a.length);
  for (const n of nums) s = s.replace(new RegExp(`\\b${n}\\b`,'g'), `<strong>${n}</strong>`);

  // Bold names
  const names = [kpis.topOrganiser, kpis.topCategory].filter(Boolean).sort((a,b) => b.length-a.length);
  for (const name of names) {
    const safe = esc(name).replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
    s = s.replace(new RegExp(`(?<![\\w>])${safe}(?![\\w<])`,'g'), `<strong>${esc(name)}</strong>`);
  }

  return s;
}

function buildTopCategoryPills(data) {
  const categoryMix = data.chartData?.categoryMix || [];
  const topCats = categoryMix.slice(0, 3);
  if (!topCats.length) return '';
  return `<div style="display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-top:14px;">
    <span style="font-size:12px;font-weight:700;color:#777;white-space:nowrap;">Top categories:</span>
    ${topCats.map(cat => {
      const cfg = CAT_CONFIG[cat.catKey] || { icon:'📍', label:cat.label || cat.catKey || 'Category', color:'#6B7280' };
      return `<span style="padding:5px 13px;border-radius:20px;font-size:12px;font-weight:700;background:${cfg.color}14;color:${cfg.color};border:1px solid ${cfg.color}30;">${esc(cfg.icon)} ${esc(cfg.label)}</span>`;

}

// ── Topbar ────────────────────────────────────────────────────────────────────
function renderTopbar(data) {
  const keywords = data.keywords || [];
  const total = data.kpis?.totalEvents ?? 0;
  const scope = buildScopeChips(data);
  let html = scope.operatorChips + scope.categoryChips;
  if (keywords.length) html += keywords.map(k => `<span class="fs-pill">${esc(k)}</span>`).join('');
  html += `<span class="fs-pill">${total} event${total!==1?'s':''}</span>`;
  document.getElementById('filterSummary').innerHTML = html;
}

function buildScopeChips(data) {
  const filters = data.filters || {};
  const opKeys = Array.isArray(filters.operators) ? filters.operators : [];
  const catKeys = Array.isArray(filters.categories) ? filters.categories : [];
  const opLabels = opKeys.map(op => {
    const key = String(op).toLowerCase();
    return {
      label: OP_LABELS[key] || op,
      color: OP_COLORS[key] || '#2C3E50'
    };
  });
  const catLabels = catKeys.map(cat => {
    const key = String(cat).toLowerCase();
    return {
      label: `${CAT_CONFIG[key]?.icon || '📍'} ${CAT_CONFIG[key]?.label || cat}`,
      color: CAT_CONFIG[key]?.color || '#2C3E50'
    };
  });
  const renderChip = (item, extraClass='') => `<span class="filter-chip ${extraClass}" style="background:${item.color}14;color:${item.color};border-color:${item.color}30;">${esc(item.label)}</span>`;
  const operatorChips = opLabels.length
    ? opLabels.map(item => renderChip(item)).join('')
    : `<span class="filter-chip">All organisers</span>`;
  const categoryChips = catLabels.length
    ? catLabels.map(item => renderChip(item, 'cat')).join('')
    : `<span class="filter-chip cat">All categories</span>`;
  return { operatorChips, categoryChips };
}

// ── Doughnut SVG ──────────────────────────────────────────────────────────────
function describeArc(cx, cy, r, sa, ea) {
  const rad = a => (a-90)*Math.PI/180;
  return `M ${cx+r*Math.cos(rad(sa))} ${cy+r*Math.sin(rad(sa))} A ${r} ${r} 0 ${(ea-sa)>180?1:0} 1 ${cx+r*Math.cos(rad(ea))} ${cy+r*Math.sin(rad(ea))}`;
}
function renderDonutGrid(rows, targetId) {
  const el = document.getElementById(targetId);
  if (!el) return;
  if (!rows.length) {
    el.innerHTML = '<div style="color:#999;font-size:13px;font-style:italic;">No organiser share data</div>';
    return;
  }
  el.innerHTML = rows.map(buildOrganiserDonutCard).join('');
}

function buildOrganiserDonutCard(row) {
  const total = row.total || 0;
  const mix = (row.segments || []).filter(d => d.count > 0);
  const isWynn = row.organiserKey === 'wynn';
  const cx = 80, cy = 80, r = 54, sw = 24;
  let paths = '';
  let angle = 0;
  if (total > 0) {
    for (const d of mix) {
      const end = angle + (d.count / total) * 360;
      paths += `<path d="${describeArc(cx,cy,r,angle,Math.min(end,angle+359.99))}" fill="none" stroke="${d.color}" stroke-width="${sw}"/>`;
      angle = end;
    }
  }
  const legend = mix.length
    ? mix.map(d => `<div class="legend-row"><span class="legend-dot" style="background:${d.color};"></span><span style="font-size:11px;color:#475569;">${esc(d.label)}</span><span class="legend-val">${d.count}</span></div>`).join('')
    : '<div style="font-size:11px;color:#94A3B8;">No events</div>';
  return `<div class="mini-chart-card ${isWynn ? 'wynn-focus' : ''}">
    <div class="mini-card-head">
      <div>
        <div class="mini-card-title" style="${isWynn ? 'color:#B45309;' : ''}">${esc(row.label)}${isWynn ? ' ★' : ''}</div>
        <div class="mini-card-sub">Category Share</div>
      </div>
      <span class="tiny-pill ${isWynn ? 'wynn-focus' : ''}">${total} events</span>
    </div>
    <div class="mini-donut-wrap">
      <svg width="160" height="160" viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg">
        ${paths || `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#E5E7EB" stroke-width="${sw}" />`}
        <text x="${cx}" y="${cy-5}" text-anchor="middle" font-size="22" font-weight="800" fill="${isWynn ? '#B45309' : '#1E1E1E'}">${total}</text>
        <text x="${cx}" y="${cy+14}" text-anchor="middle" font-size="10" fill="#888">events</text>
      </svg>
      <div class="mini-legend">${legend}</div>
    </div>
  </div>`;
}

function renderMetricGrid(rows, mode, targetId) {
  const el = document.getElementById(targetId);
  if (!el) return;
  if (!rows.length) {
    el.innerHTML = '<div style="color:#999;font-size:13px;font-style:italic;">No chart data</div>';
    return;
  }
  el.innerHTML = rows.map(row => {
    const cfg = CAT_CONFIG[row.catKey] || { icon:'📌', label:row.label || row.catKey, color:'#6B7280' };
    const items = [...(row.items || [])];
    const hasWynn = items.some(item => item.organiserKey === 'wynn');
    const max = mode === 'heat'
      ? 100
      : Math.max(1, ...items.map(item => Number(item.value) || 0));
    const bars = items.map(item => {
      const val = Number(item.value) || 0;
      const width = max > 0 ? Math.max(0, Math.min(100, (val / max) * 100)) : 0;
      const isWynn = item.organiserKey === 'wynn';
      return `<div class="metric-row ${isWynn ? 'wynn-focus' : ''}">
        <div class="metric-label ${isWynn ? 'wynn-focus' : ''}">${esc(item.label)}${isWynn ? ' ★' : ''}</div>
        <div class="metric-bar-track"><div class="metric-bar-fill" style="width:${width}%;background:${item.color};opacity:${val > 0 ? 0.9 : 0.25};"></div></div>
        <div class="metric-value ${isWynn ? 'wynn-focus' : ''}">${mode === 'heat' ? (val ? val.toFixed(1) : '0.0') : String(Math.round(val))}</div>
      </div>`;
    }).join('');
    return `<div class="mini-chart-card" style="border-top:4px solid ${cfg.color};">
      <div class="metric-card-head">
        <div class="metric-card-title"><span>${cfg.icon || '📌'}</span><span>${esc(cfg.label)}</span></div>
        <span class="tiny-pill">${mode === 'heat' ? 'Avg heat' : 'Event count'}</span>
      </div>
      <div class="metric-rows">${bars}</div>
    </div>`;
  }).join('');
}

// ── Heatmap — fully inline styles for PDF ─────────────────────────────────────
function renderHeatmap(data) {
  const hm = data.heatmapData||{};
  const filters = data.filters || {};
  const filterCats = Array.isArray(filters.categories) && filters.categories.length ? filters.categories : CAT_ORDER;
  const filterOps = Array.isArray(filters.operators) && filters.operators.length ? filters.operators : OP_KEYS;
  const activeCats = filterCats.filter(c => hm[c]);
  const activeOps = filterOps.filter(opKey => OP_KEYS.includes(opKey));
  if (!activeCats.length || !activeOps.length) { document.getElementById('hm-inner').innerHTML='<div style="color:#999;font-size:13px;font-style:italic;">No heatmap data</div>'; return; }

  let t=`<table style="border-collapse:collapse;width:100%;font-size:11px;font-family:ui-sans-serif,sans-serif;">`;
  t+=`<tr><th style="padding:5px 8px;text-align:left;font-size:10px;color:#555;font-weight:700;"></th>`;
  for (const c of activeCats) { const cfg=CAT_CONFIG[c]||{icon:'',label:c}; t+=`<th style="padding:5px 6px;text-align:center;font-size:10px;color:#555;font-weight:700;">${cfg.icon} ${esc(cfg.label)}</th>`; }
  t+=`</tr>`;
  for (const opKey of activeOps) {
    const isWynn = opKey === 'wynn';
    t+=`<tr><td style="padding:6px 8px;text-align:left;font-size:11px;font-weight:700;color:${isWynn ? '#B45309' : '#374151'};white-space:nowrap;background:${isWynn ? 'rgba(180,83,9,0.08)' : 'transparent'};">${esc(OP_LABELS[opKey])}${isWynn ? ' ★' : ''}</td>`;
    for (const cat of activeCats) {
      const cell=hm[cat]?.[opKey];
      if (!cell||cell.n===0) { t+=`<td style="padding:7px 8px;text-align:center;font-size:10.5px;font-weight:600;border:1px solid rgba(0,0,0,.06);background-color:#F3F4F6;color:#9CA3AF;">0</td>`; }
      else { const col=hmColour(cell.h||0); t+=`<td style="padding:7px 8px;text-align:center;font-size:10.5px;font-weight:600;border:1px solid rgba(0,0,0,.06);background-color:${col.bg};color:${col.text};">${cell.n}<br><span style="font-size:9px;opacity:.85;">🔥${cell.h!=null?cell.h.toFixed(0):'—'}</span></td>`; }
    }
    t+=`</tr>`;
  }
  t+=`</table>`;
  document.getElementById('hm-inner').innerHTML=`<div style="overflow-x:auto;">${t}</div>`;
}

// ── Leaderboard ───────────────────────────────────────────────────────────────
function renderLeaderboard(data) {
  const lb=data.leaderboard||[];
  if (!lb.length) { document.getElementById('lb-inner').innerHTML=`<div style="color:#999;font-size:13px;font-style:italic;">Leaderboard data unavailable. Ensure bridge.py is running.</div>`; return; }
  const rankBg=['#F59E0B','#9CA3AF','#B45309'];
  const items=lb.slice(0,10).map(e=>{
    const bg=rankBg[e.rank-1]||'#CBD5E1';
    const opColor=OP_COLORS[(e.organiserKey||e.operator||'').toLowerCase()]||'#6B7280';
    const catCfg=CAT_CONFIG[e.category]||{};
    return `<div class="lb-item">
      <div class="lb-rank" style="background:${bg};">${e.rank}</div>
      <div class="lb-body">
        <div class="lb-name">${esc(e.name)}</div>
        <div class="lb-meta">
          <span class="lb-chip" style="background-color:${opColor}18;color:${opColor};">${esc(e.organiser||e.operator||'—')}</span>
          ${catCfg.label?`<span class="lb-chip">${catCfg.icon||''} ${esc(catCfg.label)}</span>`:''}
          <span class="ev-badge ev-heat">🔥 ${Number(e.heat_score).toFixed(1)}</span>
          ${e.newest_post?`<span class="ev-badge ev-date">📅 ${esc(isoDate(e.newest_post))}</span>`:''}
        </div>
      </div>
    </div>`;
  }).join('');
  document.getElementById('lb-inner').innerHTML=items;
}

// ── Page 4 — AI Strategy ──────────────────────────────────────────────────────
function renderStrategy(data) {
  const ai = data.aiStrategy || {};
  const recItems = ai.recommendationItems || [];
  const comps = ai.comparisons || [];
  const TYPE_CONFIG = {
    keep_up: { icon:'🚀', label:'Keep it Up', color:'#15803D', bg:'rgba(22,163,74,0.08)', border:'rgba(22,163,74,0.22)' },
    improve: { icon:'⚡', label:'Improve', color:'#B45309', bg:'rgba(245,158,11,0.08)', border:'rgba(245,158,11,0.22)' },
    avoid: { icon:'🚫', label:'Avoid for Now', color:'#B91C1C', bg:'rgba(220,38,38,0.06)', border:'rgba(220,38,38,0.18)' }
  };
  if (!recItems.length) {
    const page = createPdfPage('page-strategy-empty');
    let html = miniHeader(data,'3. Strategic Recommendations for Wynn');
    html += `<div class="strategy-shell">
      <div class="strategy-head">
        <div>
          <div class="strategy-title">Strategic Recommendations for Wynn</div>
          <div class="strategy-sub">Focused strategic recommendations grounded in Wynn's real brand strengths and live market heat data.</div>
        </div>
        <div class="strategy-ai-pill">✦ AI-GENERATED</div>
      </div>`;
    html += `<div style="font-size:13px;color:#999;font-style:italic;">AI recommendations not available. Run the strategy analysis in the panel first.</div></div>`;
    page.innerHTML = html;
    return;
  }

  let html = miniHeader(data,'3. Strategic Recommendations for Wynn');
  html += `<div class="strategy-shell compact">
      <div class="strategy-head">
        <div>
          <div class="strategy-title">Strategic Recommendations for Wynn</div>
          <div class="strategy-sub">Focused strategic recommendations grounded in Wynn's real brand strengths and live market heat data.</div>
        </div>
        <div class="strategy-ai-pill">✦ AI-GENERATED</div>
      </div>`;
  html += `<div class="strategy-list">` + recItems.map(rec => {
      const catKey = String(rec.catKey || '').toLowerCase();
      const comp = comps.find(item => item.catKey === catKey);
      // If Wynn has no events in this category, cannot be "keep_up" — force to "improve"
      const wynnHasEvents = (comp?.wynn?.count || 0) > 0;
      const type = (!wynnHasEvents && String(rec.type || '').toLowerCase() === 'keep_up') ? 'improve' : String(rec.type || 'improve').toLowerCase();
      const cfg = TYPE_CONFIG[type] || TYPE_CONFIG.improve;
      const catCfg = CAT_CONFIG[catKey] || { icon:'📌', label:catKey, color:'#6B7280' };
      const rankingRows = buildStrategyRankingHtml(comp);
      return `<div class="strategy-card ${type}" style="background:${cfg.bg};border-color:${cfg.border};">
        <div class="strategy-card-head">
          <div class="strategy-icon" style="background:${cfg.color}18;border-color:${cfg.color}30;">${cfg.icon}</div>
          <div class="strategy-body">
            <div class="strategy-badges">
              <span class="strategy-type" style="color:${cfg.color};background:${cfg.color}14;border-color:${cfg.color}28;">${cfg.icon} ${cfg.label}</span>
              <span class="strategy-cat">${catCfg.icon || '📌'} ${esc(catCfg.label || catKey)}</span>
            </div>
            <div class="strategy-text">${esc(rec.text || '')}</div>
            ${rankingRows}
          </div>
        </div>
      </div>`;
    }).join('') + `</div></div>`;
  const page = createPdfPage('page-strategy');
  page.innerHTML = html;

  const lbPage = createPdfPage('page-leaderboard');
  lbPage.innerHTML = miniHeader(data,'4. Heat Leaderboard') + `
    <div class="chart-block page-section">
      <div class="chart-title">Heat Leaderboard — Top 10</div>
      <div class="chart-sub">Top 10 activities across all organisers and categories</div>
      <div id="lb-inner"></div>
    </div>`;
  renderLeaderboard(data);
}

function buildStrategyRankingHtml(comp) {
  if (!comp) return '';
  // Always include Wynn even when count=0 — show Wynn's position (or absence) in ranking
  const wynnRow = { opTitle:'Wynn', count:comp.wynn?.count || 0, avg:comp.wynn?.avgHeat || 0 };
  const opponents = [
    ...(comp.topOpponent ? [{ opTitle:comp.topOpponent.organiser, count:comp.topOpponent.count || 0, avg:comp.topOpponent.avgHeat || 0 }] : []),
    ...(Array.isArray(comp.opponents) ? comp.opponents.map(opp => ({ opTitle:opp.organiser, count:opp.count || 0, avg:opp.avgHeat || opp.avg || 0 })) : [])
  ].filter(row => row.count > 0);

  // Deduplicate competitors, then combine with Wynn
  const seen = new Set(['Wynn']);
  const uniqueOpponents = opponents.filter(row => { if (seen.has(row.opTitle)) return false; seen.add(row.opTitle); return true; });
  const rows = [wynnRow, ...uniqueOpponents].sort((a, b) => (b.avg || 0) - (a.avg || 0));

  const html = rows.map((row, i) => {
    const isWynn = row.opTitle === 'Wynn';
    const color = {
      Wynn:'#B45309', Sands:'#1D4ED8', Galaxy:'#047857', MGM:'#991B1B', Melco:'#6D28D9', SJM:'#0E7490', Government:'#374151'
    }[row.opTitle] || '#6B7280';
    const heatLabel = row.count === 0
      ? `<span class="strategy-rank-heat" style="color:#9CA3AF;font-style:italic;">no events</span>`
      : `<span class="strategy-rank-heat">🔥 avg ${Number(row.avg || 0).toFixed(1)}</span>`;
    return `<div class="strategy-rank-row ${isWynn ? 'wynn-focus' : ''}">
      <span class="strategy-rank-badge">${i + 1}</span>
      <span class="strategy-rank-name" style="color:${color};">${esc(row.opTitle)}</span>
      <span class="strategy-rank-count">: ${row.count}</span>
      ${heatLabel}
    </div>`;
  }).join('');
  const label = CAT_CONFIG[comp.catKey]?.label || comp.label || comp.catKey || '';
  return `<div class="strategy-rank-wrap">
    <div class="strategy-rank-title">Heat Ranking · ${esc(String(label).toUpperCase())}</div>
    <div class="strategy-rank-list">${html}</div>
  </div>`;
}

// ── Download PDF ──────────────────────────────────────────────────────────────
async function downloadPDF() {
  const element = document.getElementById('pdf-content');
  const pages = Array.from(element.querySelectorAll('.pdf-page'));
  const raw = localStorage.getItem('macauReportData');
  let reportData = null;
  try { reportData = raw ? JSON.parse(raw) : null; } catch (e) { reportData = null; }
  const filename = buildReportFilename(reportData);
  if (!pages.length) return;
  const html2canvasFn = window.html2canvas;
  const jsPDFCtor = window.jspdf && window.jspdf.jsPDF;
  if (!html2canvasFn || !jsPDFCtor) {
    window.alert('PDF libraries failed to load. Please refresh the preview report and try again.');
    return;
  }
  document.body.classList.add('pdf-exporting');
  try {
    const pdf = new jsPDFCtor({ unit:'mm', format:'a4', orientation:'portrait' });
    const pageWidth = 210;
    const pageHeight = 297;
    const margin = 8;
    const contentWidth = pageWidth - (margin * 2);
    const contentHeight = pageHeight - (margin * 2);

    for (let i = 0; i < pages.length; i += 1) {
      const page = pages[i];
      const canvas = await html2canvasFn(page, {
        scale: 2,
        useCORS: true,
        logging: false,
        backgroundColor: '#ffffff',
        scrollX: 0,
        scrollY: 0
      });
      const imgData = canvas.toDataURL('image/jpeg', 0.98);
      let imgWidth = contentWidth;
      let imgHeight = (canvas.height * imgWidth) / canvas.width;
      if (imgHeight > contentHeight) {
        imgHeight = contentHeight;
        imgWidth = (canvas.width * imgHeight) / canvas.height;
      }
      const x = margin + ((contentWidth - imgWidth) / 2);
      if (i > 0) pdf.addPage();
      pdf.addImage(imgData, 'JPEG', x, margin, imgWidth, imgHeight, undefined, 'FAST');
    }

    pdf.save(filename);
  } finally {
    document.body.classList.remove('pdf-exporting');
  }
}

  const raw = localStorage.getItem('macauReportData');
  if (!raw) {

      <div style="font-size:40px;margin-bottom:16px;">📄</div>

};
